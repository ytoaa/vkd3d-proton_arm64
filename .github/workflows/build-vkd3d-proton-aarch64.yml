name: Build VKD3D-Proton aarch64

run-name: Build VKD3D-Proton aarch64 (${{ github.event.inputs.vkd3d_ref || github.ref_name }})

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      vkd3d_ref:
        description: "VKD3D-Proton git ref/tag/branch/SHA to build"
        required: true
        default: "v3.0.1"
      llvm_mingw_tag:
        description: "llvm-mingw release tag"
        required: true
        default: "20260616"
      publish_release:
        description: "Upload zip to GitHub Release"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build VKD3D-Proton for Windows ARM64
    runs-on: ubuntu-22.04

    env:
      LLVM_MINGW_TAG: ${{ github.event.inputs.llvm_mingw_tag || '20260616' }}

    steps:
      - name: Checkout VKD3D-Proton source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.vkd3d_ref || github.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Resolve build metadata
        id: meta
        run: |
          set -eux

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            REQUESTED_REF="${{ github.event.inputs.vkd3d_ref }}"
          else
            REQUESTED_REF="${GITHUB_REF}"
          fi

          SHORT_SHA="$(git rev-parse --short=12 HEAD)"

          if SRC_TAG="$(git describe --tags --exact-match 2>/dev/null)"; then
            VERSION="${SRC_TAG#v}"
            OUT_NAME="vkd3d-proton-${VERSION}-aarch64"
            RELEASE_TITLE="VKD3D-Proton ${SRC_TAG} aarch64"
          else
            RAW_REF="$REQUESTED_REF"
            RAW_REF="${RAW_REF#refs/heads/}"
            RAW_REF="${RAW_REF#refs/tags/}"

            if echo "$RAW_REF" | grep -Eq '^v[0-9]'; then
              VERSION="${RAW_REF#v}"
              OUT_NAME="vkd3d-proton-${VERSION}-aarch64"
              RELEASE_TITLE="VKD3D-Proton ${RAW_REF} aarch64"
            else
              SAFE_REF="$(printf '%s' "$RAW_REF" | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9._-')"
              if [ -z "$SAFE_REF" ]; then
                SAFE_REF="manual"
              fi

              OUT_NAME="vkd3d-proton-${SAFE_REF}-aarch64"
              RELEASE_TITLE="VKD3D-Proton ${SAFE_REF} aarch64 rolling build"
            fi
          fi

          RELEASE_TAG="$OUT_NAME"

          echo "requested_ref=$REQUESTED_REF" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "out_name=$OUT_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"

          echo "Requested ref: $REQUESTED_REF"
          echo "Short SHA: $SHORT_SHA"
          echo "Output name: $OUT_NAME"
          echo "Release tag: $RELEASE_TAG"

      - name: Install build dependencies
        run: |
          set -eux

          sudo apt update
          sudo apt install -y \
            git \
            curl \
            xz-utils \
            tar \
            zip \
            file \
            python3 \
            python3-pip \
            pkg-config \
            glslang-tools

          python3 -m pip install --user --upgrade meson ninja

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check Meson and Ninja
        run: |
          set -eux

          meson --version
          ninja --version

      - name: Download llvm-mingw toolchain
        run: |
          set -eux

          mkdir -p "$HOME/toolchains"

          LLVM_MINGW_FILE="llvm-mingw-${LLVM_MINGW_TAG}-ucrt-ubuntu-22.04-x86_64.tar.xz"
          LLVM_MINGW_URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_TAG}/${LLVM_MINGW_FILE}"

          curl -fL -o "$HOME/toolchains/${LLVM_MINGW_FILE}" "$LLVM_MINGW_URL"

          tar -xf "$HOME/toolchains/${LLVM_MINGW_FILE}" \
            -C "$HOME/toolchains"

          echo "$HOME/toolchains/llvm-mingw-${LLVM_MINGW_TAG}-ucrt-ubuntu-22.04-x86_64/bin" >> "$GITHUB_PATH"

      - name: Check cross compiler
        run: |
          set -eux

          which aarch64-w64-mingw32-clang
          which aarch64-w64-mingw32-clang++
          which aarch64-w64-mingw32-ar
          which aarch64-w64-mingw32-strip
          which aarch64-w64-mingw32-windres
          which aarch64-w64-mingw32-widl

          aarch64-w64-mingw32-clang --version

      - name: Create aarch64 Windows Meson cross file
        run: |
          set -eux

          cat > build-winarm64.txt <<'EOF'
          [binaries]
          c = 'aarch64-w64-mingw32-clang'
          cpp = 'aarch64-w64-mingw32-clang++'
          ar = 'aarch64-w64-mingw32-ar'
          strip = 'aarch64-w64-mingw32-strip'
          windres = 'aarch64-w64-mingw32-windres'
          widl-mingw-tools-fallback = 'aarch64-w64-mingw32-widl'

          [properties]
          needs_exe_wrapper = true

          [host_machine]
          system = 'windows'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'
          EOF

          cat build-winarm64.txt

      - name: Build VKD3D-Proton aarch64
        run: |
          set -eux

          meson setup build.aarch64 \
            --cross-file build-winarm64.txt \
            --buildtype release \
            --prefix "$PWD/pkg" \
            --bindir aarch64 \
            --libdir aarch64 \
            --strip \
            -Db_ndebug=if-release \
            -Denable_tests=false \
            -Denable_extras=false

          ninja -C build.aarch64 install

      - name: Package DLLs
        run: |
          set -eux

          OUT_NAME="${{ steps.meta.outputs.out_name }}"
          SHORT_SHA="${{ steps.meta.outputs.short_sha }}"
          REQUESTED_REF="${{ steps.meta.outputs.requested_ref }}"

          mkdir -p "dist/${OUT_NAME}/aarch64"

          find pkg -type f -name "*.dll" -print

          cp pkg/aarch64/d3d12.dll "dist/${OUT_NAME}/aarch64/"
          cp pkg/aarch64/d3d12core.dll "dist/${OUT_NAME}/aarch64/"

          if [ -f LICENSE ]; then
            cp LICENSE "dist/${OUT_NAME}/"
          fi

          if [ -f COPYING ]; then
            cp COPYING "dist/${OUT_NAME}/"
          fi

          cat > "dist/${OUT_NAME}/build-info.txt" <<EOF
          name=${OUT_NAME}
          repository=${GITHUB_REPOSITORY}
          requested_ref=${REQUESTED_REF}
          github_ref=${GITHUB_REF}
          commit=${GITHUB_SHA}
          short_sha=${SHORT_SHA}
          llvm_mingw_tag=${LLVM_MINGW_TAG}
          EOF

          file "dist/${OUT_NAME}/aarch64/"*.dll | tee "dist/${OUT_NAME}/file-info.txt"

          cd dist
          zip -r "${OUT_NAME}.zip" "${OUT_NAME}"

      - name: Upload unpacked artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.out_name }}
          path: dist/${{ steps.meta.outputs.out_name }}
          if-no-files-found: error

      - name: Publish GitHub Release asset
        if: ${{ github.event.inputs.publish_release != 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -eux

          OUT_NAME="${{ steps.meta.outputs.out_name }}"
          RELEASE_TAG="${{ steps.meta.outputs.release_tag }}"
          RELEASE_TITLE="${{ steps.meta.outputs.release_title }}"
          ZIP_PATH="dist/${OUT_NAME}.zip"

          test -f "$ZIP_PATH"

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GH_REPO" \
              --title "$RELEASE_TITLE" \
              --notes "VKD3D-Proton aarch64 build from ${GITHUB_REPOSITORY}@${GITHUB_SHA} using llvm-mingw ${LLVM_MINGW_TAG}."
          fi

          gh release upload "$RELEASE_TAG" "$ZIP_PATH" \
            --repo "$GH_REPO" \
            --clobber
